<!DOCTYPE html>
<html>
<head>
    <title>🌾 Crop Yield Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    
    <!-- Gradient Title Styling -->
    <style>
        .fancy-title {
            font-size: 60px;
            font-weight: bold;
            background: linear-gradient(to right, #16a085, #27ae60); 
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 30px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
    </style>
</head>

<body style="text-align:center; font-family: Arial; padding: 30px;">
    
    <!-- Fancy Title -->
    <h1 class="fancy-title">🌾 Crop Yield Predictor</h1>

    <form method="POST">
        <input name="rainfall" placeholder="Rainfall (mm)" required><br><br>
        <input name="pesticide" placeholder="Pesticide (tonnes)" required><br><br>
        <input name="temperature" placeholder="Temperature (°C)" required><br><br>

        <label>Crop:</label>
        <select name="crop">
            {% for crop in crops %}
                <option value="{{ crop }}">{{ crop }}</option>
            {% endfor %}
        </select><br><br>

        <label>Country:</label>
        <select name="country">
            {% for country in countries %}
                <option value="{{ country }}">{{ country }}</option>
            {% endfor %}
        </select><br><br>

        <label>Graph X-axis:</label>
        <select name="x_var">
            <option value="Temperature">Temperature</option>
            <option value="Rainfall">Rainfall</option>
            <option value="Pesticide">Pesticide</option>
        </select><br><br>

        <input type="submit" value="Predict and Plot">
    </form>

    {% if prediction %}
        <div style="margin-top: 30px;">
            <h2 style="color: orange; font-weight: bold; font-size: 20px;
               background-color: rgba(255,255,255,0.9);
               display: inline-block;
               padding: 10px 20px;
               border-radius: 10px;
               margin-top: 10px;">
              🌾 Predicted Yield: {{ prediction | round(2) }} hg/ha
            </h2>
        </div>
    {% endif %}

    {% if image_generated %}
        <div style="margin-top: 10px;">
            <h3 style="
                color: #333;
                background-color: rgba(255, 255, 255, 0.9);
                padding: 8px 20px;
                border-radius: 10px;
                display: inline-block;
                font-weight: bold;
                font-size: 18px;">
                📈 {{ graph_choice }} Yield Curve
            </h3>
        </div>

        <img src="{{ url_for('static', filename='graph.png') }}"       
             alt="Yield Graph"
             width="700"
             style="border: 2px solid #555; box-shadow: 2px 2px 10px rgba(0,0,0,0.2); margin-top: 10px;">
    {% endif %}

</body>
</html>
